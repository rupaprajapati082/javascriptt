<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile & Posts</title>

<style>

/* Body */
body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#eef2f7,#d9e4f5);
margin:0;
padding:0;
}

/* Container */
.container{
max-width:1000px;
margin:auto;
padding:30px;
}

/* Heading */
h1{
text-align:center;
margin-bottom:30px;
color:#333;
}

/* Profile Card */
.profile-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:40px;
transition:0.3s;
}

.profile-card:hover{
transform:translateY(-5px);
}

.profile-card h3{
margin-bottom:15px;
color:#2c3e50;
}

.profile-card p{
margin:6px 0;
color:#555;
}

/* Posts Grid */
.posts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* Post Card */
.post-card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.post-card:hover{
transform:scale(1.03);
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.post-card h4{
margin-bottom:10px;
color:#34495e;
}

.post-card p{
font-size:14px;
color:#666;
line-height:1.5;
}

</style>

</head>

<body>

<div class="container">

<h1>User Profile</h1>

<!-- Profile -->
<div id="profile" class="profile-card"></div>

<h1>User Posts</h1>

<!-- Posts -->
<div id="posts" class="posts"></div>

</div>

<script src="script.js"></script>

</body>
</html>
